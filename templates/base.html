{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ElectionWatch — Transparent election monitoring platform">
  <title>{% block title %}ElectionWatch{% endblock %}</title>
  {% tailwind_css %}
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { font-family: 'Inter', system-ui, sans-serif; }
    /* Smooth scrollbar for dark theme */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.3); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.5); }
    /* Page-enter animation */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .animate-page { animation: fadeInUp 0.35s ease-out both; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full text-slate-100 antialiased">
  <div class="flex h-screen overflow-hidden">
    {% include 'partials/sidebar.html' %}
    <div class="flex-1 flex flex-col overflow-hidden">
      {% include 'partials/topbar.html' %}
      <main class="flex-1 overflow-y-auto bg-slate-950 p-6 lg:p-8">
        {% include 'partials/messages.html' %}
        <div class="animate-page">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </div>
</body>
</html>
