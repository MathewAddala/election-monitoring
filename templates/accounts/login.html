{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to ElectionWatch — Transparent election monitoring">
  <title>Sign In — ElectionWatch</title>
  {% tailwind_css %}
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { font-family: 'Inter', system-ui, sans-serif; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .animate-card { animation: fadeInUp 0.4s ease-out both; }
    .animate-card-delay { animation: fadeInUp 0.4s ease-out 0.1s both; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center p-4 antialiased">
  <!-- Background decoration -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 -left-32 w-96 h-96 bg-blue-600/8 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 -right-32 w-96 h-96 bg-violet-600/8 rounded-full blur-3xl"></div>
  </div>

  <div class="w-full max-w-md relative z-10">
    <!-- Brand -->
    <div class="text-center mb-8 animate-card">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl shadow-xl shadow-blue-900/30 mb-5">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">Welcome back</h1>
      <p class="text-slate-500 mt-1.5 text-sm">Sign in to your ElectionWatch account</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-800/60 rounded-2xl p-8 shadow-2xl animate-card-delay">
      {% if messages %}
        {% for m in messages %}
          <div class="mb-5 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm font-medium flex items-center gap-2.5">
            <svg class="w-4.5 h-4.5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
            {{ m }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="post" class="space-y-5" id="login-form">
        {% csrf_token %}
        <div>
          <label for="id_username" class="block text-sm font-medium text-slate-300 mb-2">Username</label>
          <input id="id_username" name="username" type="text" required autocomplete="username"
                 class="w-full px-4 py-3 bg-slate-950/60 border border-slate-700 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                 placeholder="Enter your username">
        </div>
        <div>
          <label for="id_password" class="block text-sm font-medium text-slate-300 mb-2">Password</label>
          <input id="id_password" name="password" type="password" required autocomplete="current-password"
                 class="w-full px-4 py-3 bg-slate-950/60 border border-slate-700 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                 placeholder="••••••••">
        </div>
        <button type="submit" id="login-btn"
                class="w-full py-3 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-semibold rounded-xl transition-all duration-200 shadow-lg shadow-blue-900/30 hover:shadow-blue-900/50 hover:-translate-y-0.5 active:translate-y-0 mt-1">
          Sign in
        </button>
      </form>

      <p class="mt-6 text-center text-slate-500 text-sm">
        Don't have an account?
        <a href="{% url 'accounts:register' %}" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors">Register</a>
      </p>
    </div>

    <p class="mt-6 text-center text-xs text-slate-600">Transparent elections for everyone</p>
  </div>
</body>
</html>
