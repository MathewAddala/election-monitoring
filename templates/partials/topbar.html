<header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800/60 px-6 lg:px-8 py-4 flex items-center justify-between shrink-0 sticky top-0 z-10">
  <h2 class="text-lg font-semibold text-white tracking-tight">{% block page_title %}ElectionWatch{% endblock %}</h2>
  {% if user.is_authenticated %}
  <div class="flex items-center gap-4">
    <a href="{% url 'accounts:profile' %}" class="text-sm text-slate-400 hover:text-white transition-colors duration-150">
      {{ user.get_role_display }}
    </a>
    <a href="{% url 'accounts:profile' %}" class="w-8 h-8 bg-gradient-to-br from-blue-500 to-violet-600 rounded-full flex items-center justify-center font-bold text-sm text-white shadow-md hover:shadow-lg hover:scale-105 transition-all duration-200">
      {{ user.username|first|upper }}
    </a>
  </div>
  {% endif %}
</header>
